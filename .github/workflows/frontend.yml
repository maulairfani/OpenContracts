name: Frontend CI

defaults:
 run:
  working-directory: ./frontend

on:
  push:
    branches:
      - main
      - v*
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          # Temporarily disable cache to debug phantom dependency issue
          # cache: "yarn"
          # cache-dependency-path: frontend/yarn.lock

      - name: Install Yarn
        run: npm install -g yarn

      - name: Clear Yarn Cache
        run: yarn cache clean

      - name: Debug - Check for tippy references
        run: |
          echo "=== Checking package.json for tippy ==="
          grep -i tippy package.json || echo "No tippy in package.json"
          echo "=== Checking yarn.lock for tippy ==="
          grep -i tippy yarn.lock || echo "No tippy in yarn.lock"
          echo "=== yarn.lock hash ==="
          shasum yarn.lock

      - name: Install Dependencies
        run: yarn install --frozen-lockfile # Use frozen lockfile for CI

      - name: Lint Prettier
        run: yarn run lint

  component-test:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: lint # Run only if lint job passes
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          # Temporarily disable cache to debug phantom dependency issue
          # cache: "yarn"
          # cache-dependency-path: frontend/yarn.lock

      - name: Install Yarn
        run: npm install -g yarn # Still need global yarn

      - name: Clear Yarn Cache
        run: yarn cache clean

      - name: Install Dependencies
        run: yarn install --frozen-lockfile # Use frozen lockfile for CI

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps

      - name: Run Playwright Component Tests
        run: yarn run test:ct

      - name: Run Metadata Component Tests
        run: |
          yarn run test:ct tests/*Metadata*.ct.tsx
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          # Temporarily disable cache to debug phantom dependency issue
          # cache: "yarn"
          # cache-dependency-path: frontend/yarn.lock
      - name: Install Yarn
        run: npm install -g yarn
      - name: Clear Yarn Cache
        run: yarn cache clean
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Build TypeScript and Vite
        run: yarn build

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          # Temporarily disable cache to debug phantom dependency issue
          # cache: "yarn"
          # cache-dependency-path: frontend/yarn.lock
      - name: Install Yarn
        run: npm install -g yarn
      - name: Clear Yarn Cache
        run: yarn cache clean
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Run Unit Tests
        run: yarn run test:unit

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build Docker Image
        run: docker build -t opencontracts-frontend .
