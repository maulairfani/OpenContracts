name: Update Documentation Screenshots

on:
  pull_request:
    paths:
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/screenshots.yml"

permissions:
  contents: write
  checks: read
  statuses: read

defaults:
  run:
    working-directory: ./frontend

jobs:
  update-screenshots:
    name: Capture & Commit Screenshots
    runs-on: ubuntu-latest
    # Only run on PRs from branches in the same repo (not forks) since we
    # need write access to push commits back to the PR branch.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          # Fetch enough history so we can rebase onto the base branch.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN - it has contents:write from the
          # permissions block above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps

      - name: Run Component Tests (captures screenshots)
        run: yarn run test:ct --reporter=list
        # Screenshots are captured as a side-effect of running tests.
        # Test failures should not block screenshot commits - the regular
        # CI workflow already gates on test success.
        continue-on-error: true

      - name: Wait for CI workflows to pass
        id: ci-gate
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Waiting for CI workflows on PR #${PR_NUMBER}..."

          # Poll for up to 60 minutes (component tests take ~10min, backend ~60min)
          MAX_ATTEMPTS=120
          SLEEP_SECONDS=30
          # Backend CI always runs on PRs to main; Frontend CI only when
          # frontend/ changes.  We require backend checks unconditionally and
          # frontend checks only when they appear.
          BACKEND_CHECKS=("linter" "pytest")
          FRONTEND_CHECKS=("Lint" "Unit Tests" "Component Tests")

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            ALL_PASSED=true
            ANY_FAILED=false

            CHECKS_OUTPUT=$(gh pr checks "$PR_NUMBER" 2>&1 || true)

            for check in "${BACKEND_CHECKS[@]}"; do
              STATUS=$(echo "$CHECKS_OUTPUT" | grep -F "$check" | head -1 | awk '{print $2}')
              if [ "$STATUS" = "fail" ]; then
                echo "FAILED: $check"
                ANY_FAILED=true
                break
              elif [ "$STATUS" != "pass" ]; then
                ALL_PASSED=false
              fi
            done

            # Only gate on frontend checks if they exist in the output
            if [ "$ANY_FAILED" = "false" ]; then
              for check in "${FRONTEND_CHECKS[@]}"; do
                STATUS=$(echo "$CHECKS_OUTPUT" | grep -F "$check" | head -1 | awk '{print $2}')
                if [ -z "$STATUS" ]; then
                  continue  # Check not present — frontend CI didn't trigger
                elif [ "$STATUS" = "fail" ]; then
                  echo "FAILED: $check"
                  ANY_FAILED=true
                  break
                elif [ "$STATUS" != "pass" ]; then
                  ALL_PASSED=false
                fi
              done
            fi

            if [ "$ANY_FAILED" = "true" ]; then
              echo "ci_passed=false" >> "$GITHUB_OUTPUT"
              echo "CI check failed — skipping screenshot commit."
              exit 0
            fi

            if [ "$ALL_PASSED" = "true" ]; then
              echo "ci_passed=true" >> "$GITHUB_OUTPUT"
              echo "All CI checks passed."
              exit 0
            fi

            echo "Attempt $attempt/$MAX_ATTEMPTS: CI checks still running, waiting ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done

          echo "ci_passed=false" >> "$GITHUB_OUTPUT"
          echo "Timed out waiting for CI checks."

      - name: Check for screenshot changes
        id: screenshot-check
        working-directory: .
        run: |
          git add docs/assets/images/screenshots/auto/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No screenshot changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Screenshot changes detected:"
            git diff --cached --name-only
          fi

      - name: Commit and push updated screenshots
        if: steps.screenshot-check.outputs.changed == 'true' && steps.ci-gate.outputs.ci_passed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save freshly generated screenshots before any rebase/merge.
          # These are the authoritative versions — we always want them to win.
          SCREENSHOT_DIR="docs/assets/images/screenshots/auto"
          BACKUP_DIR=$(mktemp -d)
          cp -a "$SCREENSHOT_DIR"/. "$BACKUP_DIR"/

          git commit -m "Update auto-generated documentation screenshots"

          # Pull latest changes. If commits were pushed while tests ran,
          # this may conflict on PNGs. We abort any failed rebase/merge
          # and force our screenshots back in.
          if ! git pull --rebase origin ${{ github.head_ref }}; then
            echo "Rebase conflict detected — aborting and restoring screenshots"
            git rebase --abort

            # Merge instead (less likely to conflict, and if it does we fix it)
            git pull --no-rebase origin ${{ github.head_ref }} || true

            # Force our freshly generated screenshots regardless of conflict state
            cp -a "$BACKUP_DIR"/. "$SCREENSHOT_DIR"/
            git checkout -- . 2>/dev/null || true
            cp -a "$BACKUP_DIR"/. "$SCREENSHOT_DIR"/
            git add "$SCREENSHOT_DIR"

            # If we were mid-merge, conclude it
            if [ -f .git/MERGE_HEAD ]; then
              git commit --no-edit
            else
              git commit -m "Update auto-generated documentation screenshots" --allow-empty
            fi
          fi

          rm -rf "$BACKUP_DIR"
          git push
