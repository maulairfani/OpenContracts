volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}

services:
  django: &django
    build:
      context: .
      args:
        - GITHUB_ACTIONS
      dockerfile: ./compose/local/django/Dockerfile
    image: opencontractserver_local_django
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vector-embedder:
        condition: service_started
      multimodal-embedder:
        condition: service_started
      docling-parser:
        condition: service_started
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - "8000:8000"
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    container_name: postgres
    image: opencontractserver_production_postgres
    shm_size: '2g'
    volumes:
      - local_postgres_data:/var/lib/postgresql/data:Z
      - local_postgres_data_backups:/backups:z
      - ./compose/production/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - ./.envs/.local/.postgres
    # Dev-friendly memory settings (production uses 2GB/128MB respectively)
    command: >
      postgres
      -c shared_buffers=512MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=2GB
      -c work_mem=16MB
      -c max_parallel_maintenance_workers=4
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  docling-parser:
    image: jscrudato/docsling-local
    container_name: docling-parser

  vector-embedder:
    image: ghcr.io/jsv4/vectorembeddermicroservice:latest
    container_name: vector-embedder
    environment:
      PORT: 8000
      TRANSFORMERS_OFFLINE: 1
      HF_DATASETS_OFFLINE: 1

  multimodal-embedder:
    image: ghcr.io/jsv4/vectorembeddermicroservice-multimodal:latest
    container_name: multimodal-embedder
    environment:
      PORT: 8000
      TRANSFORMERS_OFFLINE: 1
      HF_DATASETS_OFFLINE: 1
      API_KEY: abc123

  celeryworker:
    image: opencontractserver_local_django
    container_name: celeryworker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      docling-parser:
        condition: service_started
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    command: /start-celeryworker


  celerybeat:
    image: opencontractserver_local_django
    container_name: celerybeat
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      docling-parser:
        condition: service_started
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    command: /start-celerybeat

  flower:
    <<: *django
    image: opencontractserver_local_flower
    container_name: flower
    ports:
      - "5555:5555"
    command: /start-flower

  frontend:
      build:
        context: ./frontend
        dockerfile: ./Dockerfile
      image: opencontractserver_local_frontend
      container_name: frontend
      depends_on:
        - django
      env_file:
      - ./.envs/.local/.frontend
      ports:
        - "3000:3000"
      profiles:
        - "fullstack"
