    """ID of action to rollback"""
    actionId: ID!

    """Reason for rollback"""
    reason: String
  ): RollbackModerationActionMutation

  """
  Create or update a vote on a message.
  Users can upvote or downvote messages. Changing vote type updates the existing vote.
  Users cannot vote on their own messages.
  """
  voteMessage(
    """ID of the message to vote on"""
    messageId: String!

    """Vote type: 'upvote' or 'downvote'"""
    voteType: String!
  ): VoteMessageMutation

  """Remove user's vote from a message."""
  removeVote(
    """ID of the message to remove vote from"""
    messageId: String!
  ): RemoveVoteMutation

  """
  Create or update a vote on a conversation/thread.
  Users can upvote or downvote threads. Changing vote type updates the existing vote.
  Users cannot vote on their own threads.

  Permission: Users can vote on any conversation/thread they can see (visibility-based).
  """
  voteConversation(
    """ID of the conversation/thread to vote on"""
    conversationId: String!

    """Vote type: 'upvote' or 'downvote'"""
    voteType: String!
  ): VoteConversationMutation

  """
  Remove user's vote from a conversation/thread.

  Permission: Users can remove their vote from any conversation they can see.
  """
  removeConversationVote(
    """ID of the conversation/thread to remove vote from"""
    conversationId: String!
  ): RemoveConversationVoteMutation

  """Mark a single notification as read."""
  markNotificationRead(
    """Notification ID to mark as read"""
    notificationId: ID!
  ): MarkNotificationReadMutation

  """Mark a single notification as unread."""
  markNotificationUnread(
    """Notification ID to mark as unread"""
    notificationId: ID!
  ): MarkNotificationUnreadMutation

  """Mark all of the current user's notifications as read."""
  markAllNotificationsRead: MarkAllNotificationsReadMutation

  """Delete a notification."""
  deleteNotification(
    """Notification ID to delete"""
    notificationId: ID!
  ): DeleteNotificationMutation

  """Create a new agent configuration (admin/corpus owner only)."""
  createAgentConfiguration(
    """List of tools available to the agent"""
    availableTools: [String]

    """Avatar URL"""
    avatarUrl: String

    """Badge display configuration"""
    badgeConfig: GenericScalar

    """Corpus ID for corpus-specific agents"""
    corpusId: ID

    """Agent description"""
    description: String!

    """Whether agent is publicly visible"""
    isPublic: Boolean = true

    """Agent name"""
    name: String!

    """List of tools requiring explicit permission"""
    permissionRequiredTools: [String]

    """Scope: GLOBAL or CORPUS"""
    scope: String!

    """
    URL-friendly slug for @mentions (auto-generated from name if not provided)
    """
    slug: String

    """System instructions for the agent"""
    systemInstructions: String!
  ): CreateAgentConfigurationMutation

  """Update an existing agent configuration."""
  updateAgentConfiguration(
    """Agent ID to update"""
    agentId: ID!
    availableTools: [String]
    avatarUrl: String
    badgeConfig: GenericScalar
    description: String
    isActive: Boolean
    isPublic: Boolean
    name: String
    permissionRequiredTools: [String]

    """URL-friendly slug for @mentions"""
    slug: String
    systemInstructions: String
  ): UpdateAgentConfigurationMutation

  """Delete an agent configuration."""
  deleteAgentConfiguration(
    """Agent ID to delete"""
    agentId: ID!
  ): DeleteAgentConfigurationMutation
}

