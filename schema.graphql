  ): AddRelationship
  removeRelationship(
    """Id of the relationship that is to be deleted."""
    relationshipId: String!
  ): RemoveRelationship
  removeRelationships(relationshipIds: [String]): RemoveRelationships

  """
  Update an existing relationship by adding or removing annotations
  from source or target sets.
  """
  updateRelationship(
    """List of annotation IDs to add as sources"""
    addSourceIds: [String]

    """List of annotation IDs to add as targets"""
    addTargetIds: [String]

    """ID of the relationship to update"""
    relationshipId: String!

